<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manny's Burger Order System</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0a500">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --primary: #f0a500;
            --dark: #222;
            --light: #fff;
            --bg: #f2f4f7;
            --border: #dcdcdc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; 
            color: var(--dark);
        }

        /* خلفية اللوجو المائية */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 400px; 
            opacity: 0.08; 
            z-index: -1; 
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        h1, h2, h3 { text-align: center; }
        
        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background-color: var(--dark); color: var(--light); }
        .btn-danger { background-color: #dc3545; color: white; }

        /* نبض الزرار الأخضر */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        /* Screens */
        #menu-screen, #cart-screen { display: none; }

        /* PWA Install Section */
        #pwa-install-section {
            display: none;
            background-color: #e8f5e9;
            border: 2px solid #28a745;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Welcome Back Banner */
        #welcome-back-section {
            display: none;
            background: rgba(234, 181, 67, 0.9);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
        }

        /* Menu Layout */
        .menu-layout {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .sidebar {
            width: 90px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 5px;
            height: fit-content;
            position: sticky;
            top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .cat-tab {
            padding: 12px 5px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .cat-tab:last-child { border-bottom: none; }
        .cat-tab.active {
            background-color: var(--primary);
            color: var(--dark);
            border-radius: 5px;
        }

        .menu-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            align-content: start;
        }

        .item-btn {
            background-color: rgba(253, 253, 253, 0.95);
            border: 2px solid #eab543;
            border-radius: 6px;
            padding: 15px 5px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            transition: 0.1s;
            color: var(--dark);
        }
        .item-btn:active { transform: scale(0.95); box-shadow: inset 1px 1px 4px rgba(0,0,0,0.1); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--light);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px;
            border: 1px solid var(--border); font-size: 16px; font-family: inherit;
        }

        /* Quantity Controls */
        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
            background: var(--bg);
            padding: 10px;
            border-radius: 8px;
        }
        .qty-btn {
            background: var(--dark);
            color: var(--light);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:active { transform: scale(0.9); }
        .qty-number { font-size: 20px; font-weight: bold; min-width: 30px; }
        
        /* Cart */
        .cart-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px; padding: 15px; margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .total-price { 
            font-size: 20px; font-weight: bold; text-align: center; 
            padding: 15px; background: var(--primary); border-radius: 8px; margin: 15px 0;
        }
        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 5px; box-sizing: border-box; font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
        }
        
        #view-cart-btn {
            position: fixed; bottom: 0; left: 0; width: 100%; margin: 0; border-radius: 0; z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="branch-screen">
        <h1>Manny's Burger 🍔</h1>

        <div id="pwa-install-section">
            <p id="pwa-text" style="margin: 0 0 10px 0; font-weight: bold; color: #155724; font-size: 15px;"></p>
            
            <button id="android-install-btn" class="btn" style="display: none; background-color: #28a745; color: white; margin: 0; border: 1px solid #1e7e34; animation: pulse 2s infinite;">
                📲 نزل الأبلكيشن دلوقتي
            </button>
            
            <div id="ios-instructions" style="display: none; color: #155724; font-size: 14px; line-height: 1.6;">
                لتثبيت التطبيق على الآيفون: <br>
                اضغط على زر المشاركة <span style="font-size: 18px; font-weight: bold;">⍗</span> أسفل الشاشة <br>
                ثم اختر <strong>Add to Home Screen ➕</strong>
            </div>
        </div>
        
        <div id="welcome-back-section">
            <h3 style="margin-top:0;">أهلاً بيك تاني يا <span id="saved-name"></span>! 👋</h3>
            <p style="font-size: 15px; font-weight: bold;">تحب تنجز وتطلب نفس أوردرك الأخير؟</p>
            <button class="btn btn-secondary" onclick="reorderLastTime()">🍔 اطلب نفس الأوردر بضغطة واحدة</button>
            <p style="font-size: 13px; margin-bottom: 0;">أو اختار الفرع تحت لو حابب تعمل أوردر جديد</p>
        </div>

        <h2>بتطلب منين؟</h2>
        <button class="btn" onclick="selectBranch('Faisal')">فرع فيصل</button>
        <button class="btn" onclick="selectBranch('Sharm')">فرع شرم الشيخ</button>
    </div>

    <div id="menu-screen">
        <h3 style="margin-top: 0;">فرع <span id="branch-name-display"></span></h3>
        
        <div class="menu-layout">
            <div class="sidebar" id="sidebar-categories"></div>
            <div class="menu-content" id="menu-grid"></div>
        </div>

        <button id="view-cart-btn" class="btn btn-secondary" onclick="showCart()">🛒 السلة (<span id="cart-count">0</span>) - إتمام الطلب</button>
    </div>

    <div id="cart-screen">
        <h2>سلة المشتريات</h2>
        <div id="cart-items-container"></div>
        <div class="total-price">الإجمالي:
