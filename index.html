<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manny's Burger Order System</title>
    <style>
        :root {
            --primary: #f0a500;
            --dark: #222;
            --light: #fff;
            --bg: #f2f4f7;
            --border: #dcdcdc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; 
            color: var(--dark);
        }

        /* خلفية اللوجو المائية */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 400px; 
            opacity: 0.08; 
            z-index: -1; 
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
        }
        h1, h2, h3 { text-align: center; }
        
        /* Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background-color: var(--dark); color: var(--light); }
        .btn-danger { background-color: #dc3545; color: white; }

        /* Screens */
        #menu-screen, #cart-screen { display: none; }

        /* Welcome Back Banner */
        #welcome-back-section {
            display: none;
            background: rgba(234, 181, 67, 0.9);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid var(--primary);
        }

        /* Menu Layout */
        .menu-layout {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .sidebar {
            width: 90px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 5px;
            height: fit-content;
            position: sticky;
            top: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .cat-tab {
            padding: 12px 5px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .cat-tab:last-child { border-bottom: none; }
        .cat-tab.active {
            background-color: var(--primary);
            color: var(--dark);
            border-radius: 5px;
        }

        .menu-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            align-content: start;
        }

        .item-btn {
            background-color: rgba(253, 253, 253, 0.95);
            border: 2px solid #eab543;
            border-radius: 6px;
            padding: 15px 5px;
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70px;
            transition: 0.1s;
            color: var(--dark);
        }
        .item-btn:active { transform: scale(0.95); box-shadow: inset 1px 1px 4px rgba(0,0,0,0.1); }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--light);
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .modal-content select {
            width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px;
            border: 1px solid var(--border); font-size: 16px; font-family: inherit;
        }
        
        /* Cart */
        .cart-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px; padding: 15px; margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .total-price { 
            font-size: 20px; font-weight: bold; text-align: center; 
            padding: 15px; background: var(--primary); border-radius: 8px; margin: 15px 0;
        }
        .form-group { margin-bottom: 12px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 5px; box-sizing: border-box; font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
        }
        
        #view-cart-btn {
            position: fixed; bottom: 0; left: 0; width: 100%; margin: 0; border-radius: 0; z-index: 100;
        }
    </style>
</head>

</div>

    function checkSmartMemory() {
        const savedCustStr = localStorage.getItem('mannys_customer');
        const savedOrderStr = localStorage.getItem('mannys_last_order');

        if (savedCustStr) {
            const cust = JSON.parse(savedCustStr);
            // ملء بيانات العميل تلقائياً
            document.getElementById("cust-name").value = cust.name || "";
            document.getElementById("cust-phone").value = cust.phone || "";
            document.getElementById("cust-street").value = cust.street || "";
            document.getElementById("cust-building").value = cust.building || "";
            document.getElementById("cust-floor").value = cust.floor || "";
            document.getElementById("cust-apt").value = cust.apt || "";
            document.getElementById("cust-landmark").value = cust.landmark || "";

            // لو عنده أوردر قديم، نظهرله رسالة الترحيب
            if (savedOrderStr && JSON.parse(savedOrderStr).length > 0) {
                // استخراج الاسم الأول فقط للترحيب
                const firstName = cust.name.split(' ')[0];
                document.getElementById("saved-name").innerText = firstName;
                document.getElementById("welcome-back-section").style.display = "block";
            }
        }
    }
    // تشغيل الدالة أول ما الموقع يفتح
    window.onload = checkSmartMemory;

    // ==========================================

    // ==========================================
    function reorderLastTime() {
        const savedOrderStr = localStorage.getItem('mannys_last_order');
        const savedCustStr = localStorage.getItem('mannys_customer');
        
        if (savedOrderStr && savedCustStr) {
            cart = JSON.parse(savedOrderStr);
            const cust = JSON.parse(savedCustStr);
            currentBranch = cust.branch || 'Faisal';
            
            document.getElementById("branch-screen").style.display = "none";
            document.getElementById("cart-screen").style.display = "block";
            
            updateCartCount();
            renderCart();
            
            sfx.cash.currentTime = 0; sfx.cash.play().catch(()=>{});
        }
    }

    function selectBranch(branch) {
        currentBranch = branch;
        document.getElementById("branch-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "block";
        document.getElementById("branch-name-display").innerText = branch === 'Faisal' ? 'فيصل' : 'شرم الشيخ';
        
        renderSidebar();
        renderMenuGrid();
    }

    function renderSidebar() {
        const sidebar = document.getElementById("sidebar-categories");
        sidebar.innerHTML = "";
        const categories = [...new Set(menuData.map(item => item.category))];
        categories.forEach(cat => {
            let isActive = cat === activeCategory ? "active" : "";
            sidebar.innerHTML += `<div class="cat-tab ${isActive}" onclick="filterCategory('${cat}')">${cat}</div>`;
        });
    }

    function filterCategory(cat) {
        activeCategory = cat;
        renderSidebar();
        renderMenuGrid();
    }

    function renderMenuGrid() {
        const grid = document.getElementById("menu-grid");
        grid.innerHTML = "";
        menuData.forEach((item, index) => {
            if (item.category === activeCategory) {
                grid.innerHTML += `<div class="item-btn" onclick="openModal(${index})">${item.name}</div>`;
            }
        });
    }

    function openModal(index) {
        selectedItemIndex = index;
        const item = menuData[index];
        document.getElementById("modal-item-name").innerText = item.name;
        
        const sizeSelect = document.getElementById("modal-size-select");
        sizeSelect.innerHTML = "";
        item.sizes.forEach(size => {
            let price = item.prices[currentBranch][size];
            let sizeLabel = size === "One Size" ? "إضافة" : size;
            sizeSelect.innerHTML += `<option value="${size}|${price}">${sizeLabel} - ${price} LE</option>`;
        });

        if (item.needsCookingType) {
            document.getElementById("modal-cook-group").style.display = "block";
        } else {
            document.getElementById("modal-cook-group").style.display = "none";
        }
        document.getElementById("item-modal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("item-modal").style.display = "none";
        selectedItemIndex = null;
    }

    function addToCart() {
        if(selectedItemIndex === null) return;
        
        const item = menuData[selectedItemIndex];
        const sizeSelect = document.getElementById("modal-size-select").value;
        const [size, price] = sizeSelect.split('|');
        
        let cookType = "";
        if (item.needsCookingType) {
            cookType = document.getElementById("modal-cook-select").value;
        }

        cart.push({
            name: item.name,
            size: size === "One Size" ? "" : size,
            price: parseInt(price),
            cookType: cookType
        });

        playCategorySound(item.category);
        updateCartCount();
        closeModal();
    }

    function updateCartCount() {
        document.getElementById("cart-count").innerText = cart.length;
    }

    function showCart() {
        if(cart.length === 0) {
            alert("السلة فاضية! اختار ساندوتشاتك الأول.");
            return;
        }
        sfx.cash.currentTime = 0; sfx.cash.play().catch(()=>{});

        document.getElementById("menu-screen").style.display = "none";
        document.getElementById("cart-screen").style.display = "block";
        renderCart();
    }

    function backToMenu() {
        document.getElementById("cart-screen").style.display = "none";
        document.getElementById("menu-screen").style.display = "block";
    }

    function renderCart() {
        const container = document.getElementById("cart-items-container");
        container.innerHTML = "";
        let total = 0;

        cart.forEach((item, i) => {
            total += item.price;
            let cookStr = item.cookType ? `(${item.cookType})` : "";
            let sizeStr = item.size ? `[${item.size}]` : "";
            
            container.innerHTML += `
                <div class="cart-item">
                    <strong style="font-size:16px;">${item.name} ${cookStr} ${sizeStr}</strong> <br>
                    <span style="font-size:16px; color:#d35400; font-weight:bold;">${item.price} LE</span>
                    <button onclick="removeFromCart(${i})" style="float:left; color:red; border:1px solid red; background:#fff; padding:5px 10px; border-radius:5px; cursor:pointer;">❌ حذف</button>
                    <div style="clear:both;"></div>
                </div>`;
        });
        
        document.getElementById("total-price-display").innerText = total;
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartCount();
        if(cart.length === 0) {
            backToMenu();
        } else {
            renderCart();
        }
    }

    function sendWhatsApp() {
        const name = document.getElementById("cust-name").value;
        const phone = document.getElementById("cust-phone").value;
        const street = document.getElementById("cust-street").value;
        
        if(!name || !phone || !street) {
            alert("⚠️ برجاء ملء البيانات الأساسية (الاسم، الموبايل، الشارع)!");
            return;
        }

        sfx.motorcycle.currentTime = 0; 
        sfx.motorcycle.play().catch(()=>{});

        const building = document.getElementById("cust-building").value;
        const floor = document.getElementById("cust-floor").value;
        const apt = document.getElementById("cust-apt").value;
        const landmark = document.getElementById("cust-landmark").value;
        const globalNote = document.getElementById("global-note").value;

        // ==========================================
        // حفظ بيانات العميل في الذاكرة (Smart Memory)
        // ==========================================
        const customerData = { name, phone, street, building, floor, apt, landmark, branch: currentBranch };
        localStorage.setItem('mannys_customer', JSON.stringify(customerData));
        localStorage.setItem('mannys_last_order', JSON.stringify(cart));

        let total = 0;
        let message = `*طلب جديد من فرع: ${currentBranch === 'Faisal' ? 'فيصل' : 'شرم الشيخ'}* 🍔\n`;
        message += `-------------------\n`;
        message += `*الاسم:* ${name}\n`;
        message += `*التليفون:* ${phone}\n`;
        message += `*العنوان:* ${street}، عمارة ${building || '-'}، دور ${floor || '-'}، شقة ${apt || '-'}\n`;
        if(landmark) message += `*علامة مميزة:* ${landmark}\n`;
        message += `-------------------\n`;
        message += `*الطلب:*\n\n`;

        cart.forEach(item => {
            total += item.price;
            let cookStr = item.cookType ? `(${item.cookType})` : "";
            let sizeStr = item.size ? `[${item.size}]` : "";
            message += `▪️ 1x ${item.name} ${cookStr} ${sizeStr} - ${item.price}LE\n`;
        });

        message += `-------------------\n`;
        if(globalNote) {
            message += `📝 *ملاحظات العميل:*\n${globalNote}\n`;
            message += `-------------------\n`;
        }
        message += `💰 *الإجمالي: ${total} LE*\n`;

        const encodedMsg = encodeURIComponent(message);
        
        setTimeout(() => {
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMsg}`, '_blank');
        }, 500);
    }
</script>

</body>
</html>
